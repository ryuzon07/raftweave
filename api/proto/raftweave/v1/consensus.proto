syntax = "proto3";

package raftweave.v1;

option go_package = "github.com/raftweave/raftweave/internal/gen/raftweave/v1;raftweavev1";

import "google/protobuf/timestamp.proto";

// RaftRole enumerates the possible roles of a Raft node.
enum RaftRole {
  RAFT_ROLE_UNSPECIFIED = 0;
  RAFT_ROLE_LEADER = 1;
  RAFT_ROLE_FOLLOWER = 2;
  RAFT_ROLE_CANDIDATE = 3;
}

// RaftNodeState describes the current state of a single Raft node.
message RaftNodeState {
  string node_id = 1;
  RaftRole role = 2;
  uint64 term = 3;
  uint64 log_index = 4;
  uint64 commit_index = 5;
  string voted_for = 6;
  string leader_id = 7;
  google.protobuf.Timestamp last_heartbeat = 8;
}

// RaftClusterState describes the overall state of the Raft cluster.
message RaftClusterState {
  repeated RaftNodeState nodes = 1;
  string leader_id = 2;
  uint64 term = 3;
  int32 healthy_nodes = 4;
  int32 total_nodes = 5;
}

// LogEntry represents a single entry in the Raft log.
message LogEntry {
  uint64 index = 1;
  uint64 term = 2;
  string command_type = 3;
  bytes payload = 4;
  google.protobuf.Timestamp created_at = 5;
}

// AppendEntriesRequest is sent by the leader to replicate log entries.
message AppendEntriesRequest {
  uint64 term = 1;
  string leader_id = 2;
  uint64 prev_log_index = 3;
  uint64 prev_log_term = 4;
  repeated LogEntry entries = 5;
  uint64 leader_commit = 6;
}

// AppendEntriesResponse is returned by followers after processing AppendEntries.
message AppendEntriesResponse {
  uint64 term = 1;
  bool success = 2;
  uint64 match_index = 3;
}

// Request/Response messages
message GetClusterStateRequest {
  bool include_log_details = 1;
}

message GetClusterStateResponse {
  repeated RaftNodeState nodes = 1;
  string leader_id = 2;
  uint64 term = 3;
  int32 healthy_nodes = 4;
  int32 total_nodes = 5;
}

message StreamClusterStateRequest {
  bool include_log_details = 1;
}

message StreamClusterStateResponse {
  repeated RaftNodeState nodes = 1;
  string leader_id = 2;
  uint64 term = 3;
  int32 healthy_nodes = 4;
  int32 total_nodes = 5;
}

message RequestVoteRequest {
  uint64 term = 1;
  string candidate_id = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
}

message RequestVoteResponse {
  uint64 term = 1;
  bool vote_granted = 2;
}

// ConsensusService exposes external Raft state queries and internal RPCs.
service ConsensusService {
  // External: query cluster state
  rpc GetClusterState(GetClusterStateRequest) returns (GetClusterStateResponse);
  rpc StreamClusterState(StreamClusterStateRequest) returns (stream StreamClusterStateResponse);
  // Internal Raft RPCs
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
}
