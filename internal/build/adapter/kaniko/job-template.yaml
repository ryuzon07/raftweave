apiVersion: batch/v1
kind: Job
metadata:
  name: "kaniko-{{ .BuildID }}"
  namespace: "{{ .Namespace }}"
  labels:
    app.kubernetes.io/name: kaniko
    raftweave.io/build-id: "{{ .BuildID }}"
    raftweave.io/workload-id: "{{ .WorkloadID }}"
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 0          # No retries — build failures are surfaced to user
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: raftweave-build
      securityContext:
        runAsNonRoot: false  # Kaniko requires root internally, job is isolated
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kaniko
          image: "{{ .KanikoVersion }}"
          args:
            - "--context=dir:///workspace{{ if .SourcePath }}/{{ .SourcePath }}{{ end }}"
            - "--dockerfile={{ .DockerfilePath }}"
            - "--destination={{ .Destination }}"
            - "--cache={{ .CacheEnabled }}"
            - "--cache-repo={{ .CacheRepo }}"
            - "--compressed-caching=false"
            - "--snapshot-mode=redo"
            - "--image-name-with-digest-file=/dev/termination-log"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: registry-creds
              mountPath: /kaniko/.docker
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: "workspace-{{ .WorkloadID }}"
        - name: registry-creds
          secret:
            secretName: raftweave-registry-creds
            items:
              - key: .dockerconfigjson
                path: config.json
