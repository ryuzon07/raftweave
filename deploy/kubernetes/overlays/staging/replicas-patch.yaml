apiVersion: apps/v1
kind: Deployment
metadata:
  name: raftweave-provisioner
  namespace: raftweave
spec:
  replicas: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: raftweave-replication
  namespace: raftweave
spec:
  replicas: 1
---
