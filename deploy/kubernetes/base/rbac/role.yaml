apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: raftweave
  namespace: raftweave
  labels:
    app.kubernetes.io/name: raftweave
    app.kubernetes.io/managed-by: kustomize
rules:
  # Raft nodes need to discover each other via endpoint discovery
  - apiGroups: [""]
    resources: ["pods", "endpoints"]
    verbs: ["get", "list", "watch"]
  # ConfigMaps for dynamic configuration
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "watch"]
