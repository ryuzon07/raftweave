apiVersion: v1
kind: Service
metadata:
  name: raftweave-consensus-headless
  namespace: raftweave
  labels:
    app.kubernetes.io/name: raftweave
    app.kubernetes.io/component: consensus
    app.kubernetes.io/managed-by: kustomize
spec:
  clusterIP: None                # Headless — returns individual pod IPs
  publishNotReadyAddresses: true  # Allow peer discovery during startup
  selector:
    app.kubernetes.io/name: raftweave
    app.kubernetes.io/component: consensus
  ports:
    - name: raft
      port: 7000
      targetPort: raft
      protocol: TCP
    - name: api
      port: 8080
      targetPort: api
      protocol: TCP
