apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: raftweave-dashboard
  namespace: raftweave
  labels:
    app.kubernetes.io/name: raftweave
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/managed-by: kustomize
  annotations:
    # TLS termination via cert-manager
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # NGINX Ingress Controller annotations
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rate-limit-connections: "10"
    nginx.ingress.kubernetes.io/rate-limit-rps: "20"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - dashboard.raftweave.io
      secretName: raftweave-dashboard-tls
  rules:
    - host: dashboard.raftweave.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: raftweave-dashboard
                port:
                  name: http
          # API routes proxied to ingestion service
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: raftweave-ingestion
                port:
                  name: http
          # Webhook routes proxied to ingestion service
          - path: /webhooks
            pathType: Prefix
            backend:
              service:
                name: raftweave-ingestion
                port:
                  name: http
