apiVersion: apps/v1
kind: Deployment
metadata:
  name: raftweave-dashboard
  namespace: raftweave
  labels:
    app.kubernetes.io/name: raftweave
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: raftweave
      app.kubernetes.io/component: dashboard
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: raftweave
        app.kubernetes.io/component: dashboard
    spec:
      serviceAccountName: raftweave
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      containers:
        - name: dashboard
          image: raftweave-dashboard:v1.0.8
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4200
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: API_BASE_URL
              value: "http://raftweave-ingestion"
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false    # Next.js/Angular may need write access to /tmp
            capabilities:
              drop: ["ALL"]
