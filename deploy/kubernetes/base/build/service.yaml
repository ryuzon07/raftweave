apiVersion: v1
kind: Service
metadata:
  name: raftweave-build
  namespace: raftweave
  labels:
    app.kubernetes.io/name: raftweave
    app.kubernetes.io/component: build
    app.kubernetes.io/managed-by: kustomize
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: raftweave
    app.kubernetes.io/component: build
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
