apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: raftweave-ingestion
  namespace: raftweave
  labels:
    app.kubernetes.io/name: raftweave
    app.kubernetes.io/component: ingestion
    app.kubernetes.io/managed-by: kustomize
spec:
  minAvailable: 1                # Always keep at least 1 pod during node drain
  selector:
    matchLabels:
      app.kubernetes.io/name: raftweave
      app.kubernetes.io/component: ingestion
