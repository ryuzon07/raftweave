apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: raftweave-build-kaniko-launcher
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: raftweave-build-kaniko-launcher
subjects:
  - kind: ServiceAccount
    name: raftweave-build
    namespace: raftweave
roleRef:
  kind: ClusterRole
  name: raftweave-build-kaniko-launcher
  apiGroup: rbac.authorization.k8s.io
