apiVersion: apps/v1
kind: Deployment
metadata:
  name: raftweave-build-worker
  namespace: raftweave
  labels:
    app.kubernetes.io/name: raftweave-build-worker
    app.kubernetes.io/component: build
    app.kubernetes.io/part-of: raftweave
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: raftweave-build-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: raftweave-build-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: raftweave-build
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: ghcr.io/ryuzon07/raftweave/build-worker:latest
          imagePullPolicy: Always
          env:
            - name: REDIS_ADDR
              valueFrom:
                secretKeyRef:
                  name: raftweave-redis
                  key: addr
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: raftweave-postgres
                  key: dsn
            - name: REGISTRY_URL
              valueFrom:
                configMapKeyRef:
                  name: raftweave-build-config
                  key: registry_url
            - name: KANIKO_IMAGE
              valueFrom:
                configMapKeyRef:
                  name: raftweave-build-config
                  key: kaniko_image
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4317"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: raftweave-workspace
