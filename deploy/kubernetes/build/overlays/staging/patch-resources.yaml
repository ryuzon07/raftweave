apiVersion: apps/v1
kind: Deployment
metadata:
  name: raftweave-build-worker
  namespace: raftweave
spec:
  template:
    spec:
      containers:
        - name: worker
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
