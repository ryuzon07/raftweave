apiVersion: apps/v1
kind: Deployment
metadata:
  name: raftweave-build-worker
  namespace: raftweave
spec:
  template:
    spec:
      containers:
        - name: worker
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
