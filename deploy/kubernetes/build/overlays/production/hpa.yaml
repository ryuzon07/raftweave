apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: raftweave-build-worker
  namespace: raftweave
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: raftweave-build-worker
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: External
      external:
        metric:
          name: raftweave_build_queue_depth
        target:
          type: AverageValue
          averageValue: 5
